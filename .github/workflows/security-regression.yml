name: Security Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  supply-chain-checklist:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run supply-chain regression checklist
        shell: pwsh
        run: .\scripts\verify-supply-chain-stage.ps1 -SkipLiveReleaseCheck